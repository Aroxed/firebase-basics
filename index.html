<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Login App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div id="auth-section">
            <div id="login-section">
                <h2>Login</h2>
                <form id="login-form">
                    <input type="email" id="login-email" placeholder="Email" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
                <button id="google-login" type="button" class="google-btn">Login with Google</button>
                <p class="toggle-text">Don't have an account? <a href="#" id="show-register">Register</a></p>
                <p id="error-message" class="error"></p>
            </div>

            <div id="register-section" class="hidden">
                <h2>Register</h2>
                <form id="register-form">
                    <input type="email" id="register-email" placeholder="Email" required>
                    <input type="password" id="register-password" placeholder="Password" required minlength="6">
                    <input type="password" id="confirm-password" placeholder="Confirm Password" required minlength="6">
                    <button type="submit">Register</button>
                </form>
                <p class="toggle-text">Already have an account? <a href="#" id="show-login">Login</a></p>
                <p id="register-error" class="error"></p>
            </div>
        </div>

        <div id="user-section" class="hidden">
            <h2>Welcome, <span id="user-email"></span>!</h2>
            <button id="logout-btn">Logout</button>
            <div id="notifications"></div>
            
            <div class="login-history">
                <h3>Login History</h3>
                <div id="login-events"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
    
    <!-- App Scripts -->
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
